# 测试配置文件
spring.application.name=aps-forming-schedule-test

# H2内存数据库配置（用于测试）
# NON_KEYWORDS=YEAR,MONTH,DAY 告诉H2不要把这些当作保留字
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=YEAR,MONTH,DAY,TIME
spring.datasource.username=sa
spring.datasource.password=

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# MyBatis Plus配置
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.mapper-locations=classpath:mapper/*.xml

# 日志配置
logging.level.com.jinyu.aps=DEBUG
logging.level.PERFORMANCE=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 测试特定配置
app.test.enabled=true
app.test.mock-data=true

# 禁用数据库初始化器（测试环境使用模拟数据）
spring.sql.init.mode=never
